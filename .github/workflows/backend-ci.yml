name: Backend CI

on:
  push:
    branches:
      - develop
      - main
      - feature/**

  pull_request:
    branches:
      - develop
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: go mod tidy

      - name: Format check
        run: go fmt ./...

      - name: Run tests
        run: go test ./...

      - name: Build application
        run: go build -o app cmd/api/main.go