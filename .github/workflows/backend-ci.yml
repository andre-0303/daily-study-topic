name: Backend CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feature/**

  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: go mod tidy

      - name: Format code
        run: go fmt ./...

      - name: Run tests
        run: go test ./...

      - name: Build Go app
        run: go build -o app cmd/api/main.go

      - name: Build Docker image
        run: |
          docker build -t study-topics-api .

      - name: Run Docker container
        run: |
          docker run -d \
            -p 8080:8080 \
            --name study-topics-container \
            study-topics-api

      - name: Wait for app startup
        run: sleep 10

      - name: Health Check
        run: |
          curl --fail http://localhost:8080/health

      - name: Stop container
        if: always()
        run: docker stop study-topics-container

      - name: Remove container
        if: always()
        run: docker rm study-topics-container

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"