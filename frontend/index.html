<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Topics</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,440;0,9..144,600;1,9..144,500&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <p class="kicker">Arquivo de estudos &mdash; edição diária</p>
      <h1>Daily Topic Study</h1>

      <div class="card">
        <span class="card__index" id="catalog">Nº 000</span>

        <h2 id="title">Carregando...</h2>
        <span id="difficulty"></span>
        <p id="description"></p>

        <button id="generate-btn">
          <span>Gerar novo tópico</span>
        </button>
      </div>

      <p class="loading-tip" id="loading-tip"></p>

      <p class="footnote">Carimbado e arquivado por <em>daily-topic</em></p>
    </main>

    <script src="scripts.js"></script>
  </body>
</html>
